{% extends "encyclopedia/layout.html" %}

{% block title %}Edit {{ title }}{% endblock %}

{% block body %}
    <div>
        <h1>Edit Page</h1>
        {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        <form action="{% url 'edit_page' title=title %}" method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="title">Title</label>
                <input id="title" class="form-control" type="text" name="title" value="{{ title|default:'' }}" readonly />
            </div>
            <div class="form-group">
                <label for="content">Content (Markdown)</label>
                <textarea id="content" class="form-control" name="content" rows="10">{{ content|default:'' }}</textarea>
            </div>
            <button type="submit" class="btn btn-primary">Save Changes</button>
        </form>
    </div>
{% endblock %}
