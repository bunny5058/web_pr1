{% extends "encyclopedia/layout.html" %}

{% block title %}

{% endblock %}

{% block body %}

    <h1>{{ title }}</h1>
    <p>{{ content }}</p>
    <form action="{% url 'edit_page' title=title %}" method="get">
        <button type="submit" class="btn btn-secondary">Edit</button>
    </form>

{% endblock %}
