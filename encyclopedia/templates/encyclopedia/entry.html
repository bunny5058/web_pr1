{% extends "encyclopedia/layout.html" %}

{% block title %}
    {{ title }}
{% endblock %}

{% block body %}

    <h1>{{ title }}</h1>
    <div>{{ content|safe }}</div>
    <form action="{% url 'edit_page' title=title %}" method="get">
        <button type="submit" class="btn btn-secondary">Edit</button>
    </form>
    <form action="{% url 'delete_page' title=title %}" method="post" onsubmit="return confirm('Are you sure you want to delete this page?');">

        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Delete</button>
    </form>

{% endblock %}
